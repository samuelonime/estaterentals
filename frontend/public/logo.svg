<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none" role="img" aria-label="JerryHomes">
  <!-- Icon: stylised house -->
  <g>
    <!-- Roof -->
    <polygon points="24,4 42,20 6,20" fill="#f97316"/>
    <!-- Chimney -->
    <rect x="30" y="8" width="5" height="9" rx="1" fill="#ea580c"/>
    <!-- Body -->
    <rect x="8" y="20" width="32" height="19" rx="1" fill="#1e293b"/>
    <!-- Door -->
    <rect x="20" y="29" width="8" height="10" rx="3.5" fill="#f97316"/>
    <!-- Window left -->
    <rect x="11" y="24" width="6" height="6" rx="1" fill="#f97316" opacity="0.65"/>
    <!-- Window right -->
    <rect x="31" y="24" width="6" height="6" rx="1" fill="#f97316" opacity="0.65"/>
  </g>
  <!-- Wordmark -->
  <text x="50" y="30"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="21"
    font-weight="700"
    fill="#1e293b"
    letter-spacing="-0.3">Jerry</text>
  <text x="101" y="30"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="21"
    font-weight="700"
    fill="#f97316"
    letter-spacing="-0.3">Homes</text>
  <!-- Sub-tagline -->
  <text x="51" y="42"
    font-family="Arial, Helvetica, sans-serif"
    font-size="7"
    fill="#94a3b8"
    letter-spacing="2">PREMIUM RENTALS · ABUJA</text>
</svg>
